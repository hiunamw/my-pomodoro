<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Custom Pomodoro</title>
  <style>
    :root {
      --panel: rgba(15, 20, 28, 0.72);
      --panel-strong: rgba(15, 20, 28, 0.88);
      --text: #f8fafc;
      --muted: #b8c0cc;
      --line: rgba(255, 255, 255, 0.18);
      --accent: #a855f7;
      --accent-2: #d946ef;
      --danger: #ff7a90;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      background: #111827;
      color: var(--text);
      overflow-x: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(300px, 1fr) minmax(300px, 390px);
      gap: 18px;
      padding: 22px;
      position: relative;
      isolation: isolate;
    }

    .app.toolbar-hidden {
      grid-template-columns: 1fr;
    }

    .app.toolbar-hidden .settings {
      display: none;
    }

    .app.toolbar-hidden .timer {
      margin-inline: auto;
      text-align: center;
    }

    .app.toolbar-hidden .mode-row,
    .app.toolbar-hidden .session-line,
    .app.toolbar-hidden .controls {
      justify-content: center;
    }

    .background {
      position: fixed;
      inset: 0;
      z-index: -3;
      background: linear-gradient(135deg, #070814, #25104a 52%, #6d28d9);
      background-position: center;
      background-size: cover;
      transition: filter 220ms ease, transform 220ms ease;
    }

    .veil {
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        linear-gradient(90deg, rgba(2, 6, 23, 0.55), rgba(2, 6, 23, 0.16)),
        rgba(2, 6, 23, 0.18);
      pointer-events: none;
    }

    .timer-shell {
      min-height: calc(100vh - 44px);
      display: grid;
      align-items: center;
      padding: 18px 4vw;
    }

    .timer {
      max-width: 660px;
    }

    .eyebrow {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.4;
    }

    .mode-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 22px;
    }

    .mode-btn,
    .icon-btn,
    .secondary-btn {
      min-height: 42px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(18px);
      border-radius: 8px;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }

    .mode-btn {
      padding: 0 15px;
      color: var(--muted);
    }

    .mode-btn.active {
      background: linear-gradient(135deg, rgba(109, 40, 217, 0.72), rgba(217, 70, 239, 0.34));
      border-color: rgba(216, 180, 254, 0.72);
      color: var(--text);
      box-shadow: 0 0 28px rgba(168, 85, 247, 0.34);
    }

    .time {
      font-size: clamp(76px, 14vw, 168px);
      line-height: 0.88;
      letter-spacing: 0;
      font-weight: 800;
      text-wrap: nowrap;
      text-shadow: 0 18px 60px rgba(0, 0, 0, 0.38);
      font-variant-numeric: tabular-nums;
    }

    .session-line {
      margin: 18px 0 0;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      font-size: 15px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 22px var(--accent);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 30px;
    }

    .primary-btn {
      min-width: 132px;
      min-height: 52px;
      padding: 0 22px;
      border-radius: 8px;
      background: linear-gradient(135deg, #7c3aed, #d946ef);
      color: #fff;
      font-weight: 800;
      box-shadow: 0 18px 44px rgba(124, 58, 237, 0.38), 0 0 26px rgba(217, 70, 239, 0.22);
    }

    .icon-btn,
    .secondary-btn {
      width: 52px;
      display: inline-grid;
      place-items: center;
      color: var(--text);
    }

    .secondary-btn {
      width: auto;
      padding: 0 16px;
      color: var(--muted);
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .settings {
      align-self: stretch;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: 8px;
      backdrop-filter: blur(24px);
      overflow: hidden;
      max-height: calc(100vh - 44px);
      display: flex;
      flex-direction: column;
    }

    .settings-header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .settings-body {
      overflow: auto;
      padding: 16px 18px 20px;
    }

    .group {
      padding: 14px 0 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .group:last-child {
      border-bottom: 0;
    }

    .group-title {
      margin: 0 0 12px;
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
    }

    .field {
      display: grid;
      gap: 7px;
      margin: 12px 0;
    }

    label,
    .label {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    input[type="number"],
    input[type="text"],
    select {
      min-height: 42px;
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(2, 6, 23, 0.42);
      color: var(--text);
      border-radius: 8px;
      padding: 0 11px;
      outline: none;
    }

    input[type="color"] {
      width: 100%;
      height: 42px;
      padding: 3px;
      border: 1px solid var(--line);
      background: rgba(2, 6, 23, 0.42);
      border-radius: 8px;
    }

    input[type="range"] {
      accent-color: var(--accent);
      width: 100%;
    }

    input[type="file"] {
      width: 100%;
      color: var(--muted);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .swatches {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .swatch {
      aspect-ratio: 1;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      box-shadow: inset 0 0 0 2px rgba(0, 0, 0, 0.16);
    }

    .swatch.active {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .mini-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 12px 0;
    }

    .toggle {
      position: relative;
      width: 48px;
      height: 28px;
      flex: 0 0 auto;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid var(--line);
      border-radius: 999px;
    }

    .slider::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      left: 3px;
      top: 3px;
      border-radius: 50%;
      background: var(--text);
      transition: transform 160ms ease;
    }

    .toggle input:checked + .slider {
      background: rgba(102, 227, 196, 0.28);
      border-color: rgba(102, 227, 196, 0.62);
    }

    .toggle input:checked + .slider::after {
      transform: translateX(20px);
    }

    .sound-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(18px);
      opacity: 0;
      pointer-events: none;
      padding: 10px 14px;
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      box-shadow: var(--shadow);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    svg {
      width: 21px;
      height: 21px;
      stroke-width: 2;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @media (max-width: 860px) {
      .app {
        grid-template-columns: 1fr;
        padding: 14px;
      }

      .timer-shell {
        min-height: auto;
        padding: 38px 2px 22px;
      }

      .settings {
        max-height: none;
      }

      .time {
        font-size: clamp(68px, 23vw, 120px);
      }
    }

    @media (max-width: 440px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }

      .primary-btn {
        flex: 1 1 100%;
      }

      .secondary-btn {
        flex: 1 1 auto;
      }
    }
  </style>
</head>
<body>
  <div class="background" id="background"></div>
  <div class="veil" id="veil"></div>

  <main class="app" id="app">
    <section class="timer-shell" aria-label="Pomodoro timer">
      <div class="timer">
        <p class="eyebrow" id="todayLabel">今日專注一下</p>
        <div class="mode-row" role="tablist" aria-label="Timer mode">
          <button class="mode-btn active" data-mode="focus" type="button">Focus</button>
          <button class="mode-btn" data-mode="short" type="button">Short break</button>
          <button class="mode-btn" data-mode="long" type="button">Long break</button>
        </div>
        <div class="time" id="timeDisplay">25:00</div>
        <div class="session-line">
          <span class="dot" aria-hidden="true"></span>
          <span id="statusText">第 1 節，準備開始</span>
        </div>
        <div class="controls">
          <button class="primary-btn" id="startPause" type="button">Start</button>
          <button class="icon-btn" id="reset" type="button" title="Reset" aria-label="Reset">
            <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
          </button>
          <button class="icon-btn" id="skip" type="button" title="Skip" aria-label="Skip">
            <svg viewBox="0 0 24 24"><path d="m5 4 10 8-10 8V4Z"/><path d="M19 5v14"/></svg>
          </button>
          <button class="secondary-btn" id="fullscreen" type="button">Fullscreen</button>
          <button class="secondary-btn" id="toggleToolbar" type="button">Hide toolbar</button>
        </div>
      </div>
    </section>

    <aside class="settings" aria-label="Settings">
      <div class="settings-header">
        <h1>Custom Pomodoro</h1>
      </div>
      <div class="settings-body">
        <section class="group">
          <p class="group-title">時間</p>
          <div class="grid-2">
            <div class="field">
              <label for="focusMinutes">Focus 分鐘</label>
              <input id="focusMinutes" type="number" min="1" max="180" step="1">
            </div>
            <div class="field">
              <label for="shortMinutes">短休息</label>
              <input id="shortMinutes" type="number" min="1" max="60" step="1">
            </div>
            <div class="field">
              <label for="longMinutes">長休息</label>
              <input id="longMinutes" type="number" min="1" max="90" step="1">
            </div>
            <div class="field">
              <label for="rounds">長休息間隔</label>
              <input id="rounds" type="number" min="2" max="12" step="1">
            </div>
          </div>
          <div class="mini-row">
            <span class="label">自動開始下一節</span>
            <label class="toggle">
              <input id="autoStart" type="checkbox">
              <span class="slider"></span>
            </label>
          </div>
        </section>

        <section class="group">
          <p class="group-title">背景</p>
          <div class="field">
            <label for="backgroundUpload">上傳圖片</label>
            <input id="backgroundUpload" type="file" accept="image/*">
          </div>
          <div class="field">
            <label for="imageUrl">或貼圖片網址</label>
            <input id="imageUrl" type="text" placeholder="https://...">
          </div>
          <div class="field">
            <span class="label">預設背景</span>
            <div class="swatches" id="swatches"></div>
          </div>
          <div class="grid-2">
            <div class="field">
              <label for="customColorA">顏色 A</label>
              <input id="customColorA" type="color">
            </div>
            <div class="field">
              <label for="customColorB">顏色 B</label>
              <input id="customColorB" type="color">
            </div>
          </div>
          <div class="field">
            <label for="blur">背景模糊 <span id="blurValue">0</span>px</label>
            <input id="blur" type="range" min="0" max="16" step="1">
          </div>
          <div class="field">
            <label for="dim">暗度 <span id="dimValue">18</span>%</label>
            <input id="dim" type="range" min="0" max="72" step="1">
          </div>
        </section>

        <section class="group">
          <p class="group-title">提示音</p>
          <div class="sound-row">
            <div class="field">
              <label for="sound">鈴聲</label>
              <select id="sound">
                <option value="bell">Bell</option>
                <option value="chime">Chime</option>
                <option value="soft">Soft</option>
                <option value="off">Off</option>
              </select>
            </div>
            <button class="secondary-btn" id="testSound" type="button">Test</button>
          </div>
          <div class="field">
            <label for="volume">音量 <span id="volumeValue">70</span>%</label>
            <input id="volume" type="range" min="0" max="100" step="1">
          </div>
        </section>

        <section class="group">
          <button class="secondary-btn" id="clearBackground" type="button">清除自訂背景</button>
          <button class="secondary-btn" id="resetAll" type="button">重設全部</button>
        </section>
      </div>
    </aside>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const presets = [
      { name: "Monarch", a: "#070814", b: "#25104a", c: "#6d28d9" },
      { name: "Moss", a: "#10251d", b: "#2f5c48", c: "#a9b85f" },
      { name: "Ink", a: "#09111f", b: "#27314d", c: "#6f4967" },
      { name: "Coral", a: "#332235", b: "#8f4c5d", c: "#f4b26d" },
      { name: "Steel", a: "#111827", b: "#3b5368", c: "#b4c7c9" }
    ];

    const defaults = {
      focusMinutes: 25,
      shortMinutes: 5,
      longMinutes: 15,
      rounds: 4,
      autoStart: false,
      mode: "focus",
      completedFocus: 0,
      backgroundType: "preset",
      presetIndex: 0,
      imageUrl: "",
      uploadedImage: "",
      customColorA: "#17202e",
      customColorB: "#1d4d55",
      blur: 0,
      dim: 18,
      sound: "bell",
      volume: 70
    };

    const state = loadState();
    let mode = state.mode;
    let isRunning = false;
    let remaining = getModeSeconds(mode);
    let targetTime = 0;
    let tickTimer = null;

    const $ = (id) => document.getElementById(id);
    const timeDisplay = $("timeDisplay");
    const statusText = $("statusText");
    const startPause = $("startPause");
    const modeButtons = [...document.querySelectorAll(".mode-btn")];
    const background = $("background");
    const veil = $("veil");
    const toast = $("toast");
    const app = $("app");

    init();

    function init() {
      $("todayLabel").textContent = new Intl.DateTimeFormat("zh-Hant", {
        weekday: "long",
        month: "long",
        day: "numeric"
      }).format(new Date());

      for (const key of ["focusMinutes", "shortMinutes", "longMinutes", "rounds", "customColorA", "customColorB", "blur", "dim", "sound", "volume", "imageUrl"]) {
        $(key).value = state[key];
      }
      $("autoStart").checked = state.autoStart;
      renderSwatches();
      applyBackground();
      applyEmbedMode();
      setMode(mode, false);
      bindEvents();
    }

    function bindEvents() {
      startPause.addEventListener("click", toggleTimer);
      $("reset").addEventListener("click", () => resetTimer(true));
      $("skip").addEventListener("click", completeMode);
      $("fullscreen").addEventListener("click", toggleFullscreen);
      $("toggleToolbar").addEventListener("click", toggleToolbar);
      $("testSound").addEventListener("click", playSound);
      $("clearBackground").addEventListener("click", clearBackground);
      $("resetAll").addEventListener("click", resetAll);

      modeButtons.forEach((button) => {
        button.addEventListener("click", () => setMode(button.dataset.mode, true));
      });

      for (const key of ["focusMinutes", "shortMinutes", "longMinutes", "rounds"]) {
        $(key).addEventListener("change", () => {
          state[key] = clampNumber($(key).value, defaults[key], Number($(key).min), Number($(key).max));
          $(key).value = state[key];
          saveState();
          resetTimer(false);
        });
      }

      $("autoStart").addEventListener("change", () => {
        state.autoStart = $("autoStart").checked;
        saveState();
      });

      $("backgroundUpload").addEventListener("change", handleUpload);
      $("imageUrl").addEventListener("change", () => {
        state.imageUrl = $("imageUrl").value.trim();
        if (state.imageUrl) {
          state.backgroundType = "url";
          state.uploadedImage = "";
        }
        saveState();
        applyBackground();
      });

      for (const key of ["customColorA", "customColorB"]) {
        $(key).addEventListener("input", () => {
          state[key] = $(key).value;
          state.backgroundType = "custom";
          saveState();
          applyBackground();
          renderSwatches();
        });
      }

      for (const key of ["blur", "dim", "volume"]) {
        $(key).addEventListener("input", () => {
          state[key] = Number($(key).value);
          $(`${key}Value`).textContent = state[key];
          saveState();
          if (key !== "volume") applyBackground();
        });
      }

      $("sound").addEventListener("change", () => {
        state.sound = $("sound").value;
        saveState();
      });

      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") updateDisplay();
      });
    }

    function renderSwatches() {
      const holder = $("swatches");
      holder.innerHTML = "";
      presets.forEach((preset, index) => {
        const button = document.createElement("button");
        button.className = `swatch ${state.backgroundType === "preset" && state.presetIndex === index ? "active" : ""}`;
        button.type = "button";
        button.title = preset.name;
        button.setAttribute("aria-label", preset.name);
        button.style.background = `linear-gradient(135deg, ${preset.a}, ${preset.b} 52%, ${preset.c})`;
        button.addEventListener("click", () => {
          state.backgroundType = "preset";
          state.presetIndex = index;
          state.uploadedImage = "";
          state.imageUrl = "";
          $("imageUrl").value = "";
          saveState();
          applyBackground();
          renderSwatches();
        });
        holder.appendChild(button);
      });
    }

    function applyBackground() {
      const preset = presets[state.presetIndex] || presets[0];
      let bg = `linear-gradient(135deg, ${preset.a}, ${preset.b} 52%, ${preset.c})`;

      if (state.backgroundType === "custom") {
        bg = `linear-gradient(135deg, ${state.customColorA}, ${state.customColorB})`;
      }
      if (state.backgroundType === "upload" && state.uploadedImage) {
        bg = `url("${state.uploadedImage}")`;
      }
      if (state.backgroundType === "url" && state.imageUrl) {
        bg = `url("${cssEscapeUrl(state.imageUrl)}")`;
      }

      background.style.backgroundImage = bg;
      background.style.filter = `blur(${state.blur}px)`;
      background.style.transform = state.blur > 0 ? "scale(1.04)" : "scale(1)";
      veil.style.background = `linear-gradient(90deg, rgba(2, 6, 23, ${state.dim / 100 + 0.28}), rgba(2, 6, 23, ${state.dim / 260})), rgba(2, 6, 23, ${state.dim / 100})`;
      $("blurValue").textContent = state.blur;
      $("dimValue").textContent = state.dim;
      $("volumeValue").textContent = state.volume;
    }

    function handleUpload(event) {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      if (file.size > 2.5 * 1024 * 1024) {
        showToast("圖片太大，請用 2.5MB 以下");
        event.target.value = "";
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        state.uploadedImage = reader.result;
        state.backgroundType = "upload";
        state.imageUrl = "";
        $("imageUrl").value = "";
        if (saveState()) {
          applyBackground();
          renderSwatches();
          showToast("背景已更新");
        } else {
          state.uploadedImage = "";
          state.backgroundType = "preset";
          event.target.value = "";
          applyBackground();
        }
      };
      reader.readAsDataURL(file);
    }

    function setMode(nextMode, reset) {
      mode = nextMode;
      state.mode = mode;
      modeButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.mode === mode);
      });
      saveState();
      if (reset) resetTimer(false);
      updateDisplay();
    }

    function toggleTimer() {
      if (isRunning) {
        pauseTimer();
      } else {
        startTimer();
      }
    }

    function startTimer() {
      if (remaining <= 0) remaining = getModeSeconds(mode);
      isRunning = true;
      targetTime = Date.now() + remaining * 1000;
      startPause.textContent = "Pause";
      tickTimer = window.setInterval(updateDisplay, 250);
      updateDisplay();
    }

    function pauseTimer() {
      isRunning = false;
      window.clearInterval(tickTimer);
      remaining = Math.max(0, Math.ceil((targetTime - Date.now()) / 1000));
      startPause.textContent = "Start";
      updateDisplay();
    }

    function resetTimer(withToast) {
      pauseTimer();
      remaining = getModeSeconds(mode);
      updateDisplay();
      if (withToast) showToast("已重設");
    }

    function updateDisplay() {
      if (isRunning) {
        remaining = Math.max(0, Math.ceil((targetTime - Date.now()) / 1000));
        if (remaining <= 0) completeMode();
      }

      const minutes = Math.floor(remaining / 60);
      const seconds = remaining % 60;
      timeDisplay.textContent = `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
      document.title = `${timeDisplay.textContent} - ${modeLabel(mode)}`;
      statusText.textContent = statusLabel();
    }

    function completeMode() {
      pauseTimer();
      playSound();

      if (mode === "focus") {
        state.completedFocus += 1;
        const next = state.completedFocus % state.rounds === 0 ? "long" : "short";
        setMode(next, false);
        remaining = getModeSeconds(next);
        showToast(next === "long" ? "長休息時間" : "短休息時間");
      } else {
        setMode("focus", false);
        remaining = getModeSeconds("focus");
        showToast("返嚟專注");
      }

      saveState();
      updateDisplay();
      if (state.autoStart) startTimer();
    }

    function getModeSeconds(currentMode) {
      const minutes = {
        focus: state.focusMinutes,
        short: state.shortMinutes,
        long: state.longMinutes
      }[currentMode];
      return Math.max(1, minutes) * 60;
    }

    function modeLabel(currentMode) {
      return {
        focus: "Focus",
        short: "Short break",
        long: "Long break"
      }[currentMode];
    }

    function statusLabel() {
      if (mode === "focus") {
        return `第 ${state.completedFocus + 1} 節${isRunning ? "，專注中" : "，準備開始"}`;
      }
      return `${mode === "long" ? "長休息" : "短休息"}${isRunning ? "中" : "，飲啖水先"}`;
    }

    function playSound() {
      if (state.sound === "off" || state.volume === 0) return;
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return;
      const audio = new AudioContextClass();
      const gain = audio.createGain();
      gain.gain.value = state.volume / 100;
      gain.connect(audio.destination);

      const pattern = {
        bell: [880, 660, 440],
        chime: [523.25, 659.25, 783.99],
        soft: [392, 523.25]
      }[state.sound];

      pattern.forEach((frequency, index) => {
        const osc = audio.createOscillator();
        const noteGain = audio.createGain();
        osc.type = state.sound === "soft" ? "sine" : "triangle";
        osc.frequency.value = frequency;
        noteGain.gain.setValueAtTime(0, audio.currentTime + index * 0.16);
        noteGain.gain.linearRampToValueAtTime(0.2, audio.currentTime + index * 0.16 + 0.02);
        noteGain.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + index * 0.16 + 0.42);
        osc.connect(noteGain).connect(gain);
        osc.start(audio.currentTime + index * 0.16);
        osc.stop(audio.currentTime + index * 0.16 + 0.45);
      });
    }

    function toggleFullscreen() {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        document.documentElement.requestFullscreen();
      }
    }

    function applyEmbedMode() {
      const params = new URLSearchParams(window.location.search);
      const shouldEmbed = params.get("embed") === "1" || window.location.hash === "#embed";
      app.classList.toggle("toolbar-hidden", shouldEmbed);
      $("toggleToolbar").textContent = shouldEmbed ? "Show toolbar" : "Hide toolbar";
    }

    function toggleToolbar() {
      const hidden = app.classList.toggle("toolbar-hidden");
      $("toggleToolbar").textContent = hidden ? "Show toolbar" : "Hide toolbar";
    }

    function clearBackground() {
      state.backgroundType = "preset";
      state.presetIndex = 0;
      state.uploadedImage = "";
      state.imageUrl = "";
      $("imageUrl").value = "";
      $("backgroundUpload").value = "";
      saveState();
      applyBackground();
      renderSwatches();
      showToast("背景已清除");
    }

    function resetAll() {
      Object.assign(state, structuredClone(defaults));
      saveState();
      location.reload();
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem("customPomodoroState") || "{}");
        return { ...structuredClone(defaults), ...saved };
      } catch {
        return structuredClone(defaults);
      }
    }

    function saveState() {
      try {
        localStorage.setItem("customPomodoroState", JSON.stringify(state));
        return true;
      } catch {
        showToast("設定未能儲存，請用較細圖片");
        return false;
      }
    }

    function clampNumber(value, fallback, min, max) {
      const number = Number(value);
      if (!Number.isFinite(number)) return fallback;
      return Math.min(max, Math.max(min, Math.round(number)));
    }

    function cssEscapeUrl(url) {
      return url.replaceAll('"', "%22").replaceAll("\\", "%5C");
    }
  </script>
</body>
</html>
